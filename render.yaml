services:
  - type: web
    name: pairwise-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # You'll paste this in the Render dashboard
      - key: PYTHONPATH
        value: /opt/render/project/src
